<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192' rx='32'/><rect fill='%237c3aed' x='24' y='24' width='48' height='48' rx='8'/><rect fill='%23ec4899' x='80' y='24' width='48' height='48' rx='8'/><rect fill='%2322c55e' x='24' y='80' width='48' height='48' rx='8'/><rect fill='%23f97316' x='80' y='80' width='48' height='48' rx='8'/></svg>" />
  <title>Block Breaker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100dvh;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 10px;
      gap: 10px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-value {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #grid-container {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 8px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #grid {
      display: grid;
      gap: 3px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 3px;
    }

    .cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      transition: background-color 0.15s, transform 0.1s;
    }

    .cell.filled {
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.2);
    }

    .cell.preview {
      background: rgba(124, 58, 237, 0.4) !important;
      border: 2px dashed rgba(124, 58, 237, 0.8);
    }

    .cell.preview-invalid {
      background: rgba(239, 68, 68, 0.4) !important;
      border: 2px dashed rgba(239, 68, 68, 0.8);
    }

    .cell.clearing {
      animation: clear-pulse 0.4s ease-out;
    }

    @keyframes clear-pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    #pieces-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      min-height: 100px;
    }

    .piece-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-width: 80px;
      min-height: 80px;
      cursor: grab;
      transition: transform 0.2s, opacity 0.2s;
    }

    .piece-slot:active {
      cursor: grabbing;
    }

    .piece-slot.dragging {
      opacity: 0.3;
      transform: scale(0.9);
    }

    .piece-slot.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .piece-grid {
      display: grid;
      gap: 2px;
    }

    .piece-cell {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      transition: transform 0.1s;
    }

    .piece-cell.filled {
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.2);
    }

    #drag-preview {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.9;
      transform: translate(-50%, -50%) scale(1.1);
    }

    #drag-preview .piece-cell {
      width: 38px;
      height: 38px;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,20,0.9);
      color: #fff;
      text-align: center;
      padding: 24px;
      z-index: 100;
    }

    #overlay h1 {
      font-size: clamp(32px, 10vw, 56px);
      background: linear-gradient(135deg, #a78bfa, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    #overlay p {
      font-size: clamp(14px, 4vw, 18px);
      color: #c4b5fd;
      margin-bottom: 8px;
      max-width: 320px;
      line-height: 1.6;
    }

    .score-display {
      font-size: clamp(24px, 6vw, 36px);
      color: #fbbf24;
      margin: 16px 0;
      font-weight: bold;
    }

    .high-score {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
    }

    #startBtn {
      margin-top: 20px;
      padding: 16px 48px;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #startBtn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(124,58,237,0.4);
    }

    .hidden { display: none !important; }

    /* Block colors */
    .color-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .color-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
    .color-yellow { background: linear-gradient(135deg, #eab308, #ca8a04); }
    .color-green { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .color-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
    .color-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .color-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .color-pink { background: linear-gradient(135deg, #ec4899, #db2777); }

    /* Turns indicator */
    #turns-display {
      position: absolute;
      top: 8px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score-display">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="best-display">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Lines</span>
        <span class="hud-value" id="lines-display">0</span>
      </div>
    </div>

    <div id="grid-container">
      <div id="grid"></div>
    </div>

    <div id="pieces-container"></div>
  </div>

  <div id="overlay">
    <h1>BLOCK BREAKER</h1>
    <p id="overlay-msg">Drag pieces onto the grid. Clear rows and columns to score points!</p>
    <div id="final-score" class="score-display hidden"></div>
    <div id="high-score-msg" class="high-score hidden"></div>
    <button id="startBtn">PLAY</button>
  </div>

  <div id="drag-preview" class="hidden"></div>

  <script>
  (() => {
    "use strict";

    // ═══════════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════════
    const GRID_SIZE = 8;
    const CELL_SIZE = Math.min(40, (Math.min(window.innerWidth, 400) - 40) / GRID_SIZE);
    const COLORS = ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple', 'pink'];

    // Tetris-like piece definitions (relative coordinates)
    const PIECE_TEMPLATES = [
      // Single block
      { shape: [[0,0]], name: 'dot' },

      // 2-blocks
      { shape: [[0,0], [1,0]], name: 'h2' },
      { shape: [[0,0], [0,1]], name: 'v2' },

      // 3-blocks
      { shape: [[0,0], [1,0], [2,0]], name: 'h3' },
      { shape: [[0,0], [0,1], [0,2]], name: 'v3' },
      { shape: [[0,0], [1,0], [0,1]], name: 'corner3' },
      { shape: [[0,0], [1,0], [1,1]], name: 'corner3b' },
      { shape: [[0,1], [1,0], [1,1]], name: 'corner3c' },
      { shape: [[0,0], [0,1], [1,1]], name: 'corner3d' },

      // 4-blocks
      { shape: [[0,0], [1,0], [2,0], [3,0]], name: 'h4' },
      { shape: [[0,0], [0,1], [0,2], [0,3]], name: 'v4' },
      { shape: [[0,0], [1,0], [0,1], [1,1]], name: 'square' },
      { shape: [[0,0], [1,0], [2,0], [1,1]], name: 'T' },
      { shape: [[1,0], [0,1], [1,1], [2,1]], name: 'T_up' },
      { shape: [[0,0], [0,1], [0,2], [1,1]], name: 'T_right' },
      { shape: [[0,0], [1,0], [1,1], [2,1]], name: 'S' },
      { shape: [[1,0], [2,0], [0,1], [1,1]], name: 'Z' },
      { shape: [[0,0], [1,0], [2,0], [0,1]], name: 'L' },
      { shape: [[0,0], [1,0], [2,0], [2,1]], name: 'J' },

      // 5-blocks
      { shape: [[0,0], [1,0], [2,0], [3,0], [4,0]], name: 'h5' },
      { shape: [[0,0], [0,1], [0,2], [0,3], [0,4]], name: 'v5' },
      { shape: [[0,0], [1,0], [2,0], [0,1], [0,2]], name: 'bigL' },
      { shape: [[0,0], [1,0], [2,0], [2,1], [2,2]], name: 'bigJ' },
      { shape: [[0,0], [0,1], [0,2], [1,2], [2,2]], name: 'bigL2' },
      { shape: [[2,0], [2,1], [0,2], [1,2], [2,2]], name: 'bigJ2' },

      // Large square
      { shape: [[0,0], [1,0], [2,0], [0,1], [1,1], [2,1], [0,2], [1,2], [2,2]], name: 'bigSquare' },
    ];

    // ═══════════════════════════════════════════════════════════════
    // GAME STATE
    // ═══════════════════════════════════════════════════════════════
    let grid = [];
    let currentPieces = [];
    let score = 0;
    let linesCleared = 0;
    let highScore = parseInt(localStorage.getItem('blockBreakerHighScore') || '0');
    let gameState = 'idle'; // idle, playing, over
    let draggedPiece = null;
    let dragOffset = { x: 0, y: 0 };

    // ═══════════════════════════════════════════════════════════════
    // DOM ELEMENTS
    // ═══════════════════════════════════════════════════════════════
    const gridEl = document.getElementById('grid');
    const piecesContainer = document.getElementById('pieces-container');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const scoreDisplay = document.getElementById('score-display');
    const bestDisplay = document.getElementById('best-display');
    const linesDisplay = document.getElementById('lines-display');
    const dragPreview = document.getElementById('drag-preview');
    const finalScore = document.getElementById('final-score');
    const highScoreMsg = document.getElementById('high-score-msg');
    const overlayMsg = document.getElementById('overlay-msg');

    // ═══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════
    function init() {
      setupGrid();
      bestDisplay.textContent = highScore;
      startBtn.addEventListener('click', startGame);
    }

    function setupGrid() {
      gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, ${CELL_SIZE}px)`;
      gridEl.innerHTML = '';

      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.x = x;
          cell.dataset.y = y;
          cell.style.width = `${CELL_SIZE}px`;
          cell.style.height = `${CELL_SIZE}px`;
          gridEl.appendChild(cell);
        }
      }
    }

    function initGrid() {
      grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));

      // Add some initial random blocks to make the game interesting
      const initialBlocks = Math.floor(Math.random() * 8) + 5; // 5-12 random blocks
      let placed = 0;

      while (placed < initialBlocks) {
        const x = Math.floor(Math.random() * GRID_SIZE);
        const y = Math.floor(Math.random() * (GRID_SIZE - 2)) + 2; // Bottom 6 rows only

        if (!grid[y][x]) {
          grid[y][x] = COLORS[Math.floor(Math.random() * COLORS.length)];
          placed++;
        }
      }

      renderGrid();
    }

    function renderGrid() {
      const cells = gridEl.querySelectorAll('.cell');
      cells.forEach(cell => {
        const x = parseInt(cell.dataset.x);
        const y = parseInt(cell.dataset.y);
        const color = grid[y][x];

        cell.className = 'cell';
        if (color) {
          cell.classList.add('filled', `color-${color}`);
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // PIECE GENERATION
    // ═══════════════════════════════════════════════════════════════
    function generatePiece() {
      const template = PIECE_TEMPLATES[Math.floor(Math.random() * PIECE_TEMPLATES.length)];
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];

      // Calculate bounds
      let maxX = 0, maxY = 0;
      template.shape.forEach(([x, y]) => {
        maxX = Math.max(maxX, x);
        maxY = Math.max(maxY, y);
      });

      return {
        shape: template.shape,
        color: color,
        width: maxX + 1,
        height: maxY + 1,
        used: false
      };
    }

    function generatePieceSet() {
      currentPieces = [generatePiece(), generatePiece(), generatePiece()];
      renderPieces();
    }

    function renderPieces() {
      piecesContainer.innerHTML = '';

      currentPieces.forEach((piece, index) => {
        const slot = document.createElement('div');
        slot.className = 'piece-slot';
        if (piece.used) {
          slot.classList.add('disabled');
        } else {
          // Check if piece can be placed anywhere
          if (!canPieceFitAnywhere(piece)) {
            slot.classList.add('disabled');
          }
        }
        slot.dataset.index = index;

        if (!piece.used) {
          const pieceGrid = document.createElement('div');
          pieceGrid.className = 'piece-grid';
          pieceGrid.style.gridTemplateColumns = `repeat(${piece.width}, 18px)`;

          // Create grid for piece
          for (let y = 0; y < piece.height; y++) {
            for (let x = 0; x < piece.width; x++) {
              const cell = document.createElement('div');
              cell.className = 'piece-cell';

              // Check if this position has a block
              const hasBlock = piece.shape.some(([px, py]) => px === x && py === y);
              if (hasBlock) {
                cell.classList.add('filled', `color-${piece.color}`);
              }

              pieceGrid.appendChild(cell);
            }
          }

          slot.appendChild(pieceGrid);

          // Add drag events
          slot.addEventListener('mousedown', (e) => startDrag(e, index));
          slot.addEventListener('touchstart', (e) => startDrag(e, index), { passive: false });
        }

        piecesContainer.appendChild(slot);
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // DRAG AND DROP
    // ═══════════════════════════════════════════════════════════════
    function startDrag(e, pieceIndex) {
      if (gameState !== 'playing') return;

      const piece = currentPieces[pieceIndex];
      if (piece.used || !canPieceFitAnywhere(piece)) return;

      e.preventDefault();

      draggedPiece = { piece, index: pieceIndex };

      const slot = piecesContainer.children[pieceIndex];
      slot.classList.add('dragging');

      // Create drag preview
      createDragPreview(piece);

      // Get initial position
      const pos = getEventPosition(e);
      updateDragPosition(pos.x, pos.y);

      // Add move/end listeners
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
      document.addEventListener('touchmove', onDragMove, { passive: false });
      document.addEventListener('touchend', onDragEnd);
    }

    function createDragPreview(piece) {
      dragPreview.innerHTML = '';
      dragPreview.classList.remove('hidden');

      const pieceGrid = document.createElement('div');
      pieceGrid.className = 'piece-grid';
      pieceGrid.style.gridTemplateColumns = `repeat(${piece.width}, 38px)`;

      for (let y = 0; y < piece.height; y++) {
        for (let x = 0; x < piece.width; x++) {
          const cell = document.createElement('div');
          cell.className = 'piece-cell';

          const hasBlock = piece.shape.some(([px, py]) => px === x && py === y);
          if (hasBlock) {
            cell.classList.add('filled', `color-${piece.color}`);
          }

          pieceGrid.appendChild(cell);
        }
      }

      dragPreview.appendChild(pieceGrid);
    }

    function onDragMove(e) {
      if (!draggedPiece) return;
      e.preventDefault();

      const pos = getEventPosition(e);
      updateDragPosition(pos.x, pos.y);
      updateGridPreview(pos.x, pos.y);
    }

    function updateDragPosition(x, y) {
      dragPreview.style.left = `${x}px`;
      dragPreview.style.top = `${y - 60}px`; // Offset up so user can see grid
    }

    function updateGridPreview(x, y) {
      clearPreview();

      const gridRect = gridEl.getBoundingClientRect();
      const cellSize = gridRect.width / GRID_SIZE;

      // Calculate grid position (centered on piece)
      const piece = draggedPiece.piece;
      const gridX = Math.floor((x - gridRect.left) / cellSize - piece.width / 2 + 0.5);
      const gridY = Math.floor((y - 60 - gridRect.top) / cellSize - piece.height / 2 + 0.5);

      const canPlace = canPlacePiece(piece, gridX, gridY);

      // Show preview
      piece.shape.forEach(([px, py]) => {
        const cellX = gridX + px;
        const cellY = gridY + py;

        if (cellX >= 0 && cellX < GRID_SIZE && cellY >= 0 && cellY < GRID_SIZE) {
          const cellEl = gridEl.querySelector(`[data-x="${cellX}"][data-y="${cellY}"]`);
          if (cellEl) {
            cellEl.classList.add(canPlace ? 'preview' : 'preview-invalid');
          }
        }
      });
    }

    function clearPreview() {
      gridEl.querySelectorAll('.preview, .preview-invalid').forEach(cell => {
        cell.classList.remove('preview', 'preview-invalid');
      });
    }

    function onDragEnd(e) {
      if (!draggedPiece) return;

      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup', onDragEnd);
      document.removeEventListener('touchmove', onDragMove);
      document.removeEventListener('touchend', onDragEnd);

      const pos = getEventPosition(e);
      tryPlacePiece(pos.x, pos.y);

      // Reset
      clearPreview();
      dragPreview.classList.add('hidden');

      const slot = piecesContainer.children[draggedPiece.index];
      if (slot) slot.classList.remove('dragging');

      draggedPiece = null;
    }

    function getEventPosition(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.changedTouches && e.changedTouches.length > 0) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    // ═══════════════════════════════════════════════════════════════
    // PIECE PLACEMENT
    // ═══════════════════════════════════════════════════════════════
    function canPlacePiece(piece, gridX, gridY) {
      return piece.shape.every(([px, py]) => {
        const x = gridX + px;
        const y = gridY + py;
        return x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE && !grid[y][x];
      });
    }

    function canPieceFitAnywhere(piece) {
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          if (canPlacePiece(piece, x, y)) return true;
        }
      }
      return false;
    }

    function tryPlacePiece(x, y) {
      const gridRect = gridEl.getBoundingClientRect();
      const cellSize = gridRect.width / GRID_SIZE;

      const piece = draggedPiece.piece;
      const gridX = Math.floor((x - gridRect.left) / cellSize - piece.width / 2 + 0.5);
      const gridY = Math.floor((y - 60 - gridRect.top) / cellSize - piece.height / 2 + 0.5);

      if (canPlacePiece(piece, gridX, gridY)) {
        placePiece(piece, gridX, gridY);
        currentPieces[draggedPiece.index].used = true;

        // Add score for placing
        score += piece.shape.length;
        updateScore();

        // Check for line clears
        checkAndClearLines();

        // Check if we need new pieces
        if (currentPieces.every(p => p.used)) {
          generatePieceSet();
        } else {
          renderPieces();
        }

        // Check for game over
        checkGameOver();
      }
    }

    function placePiece(piece, gridX, gridY) {
      piece.shape.forEach(([px, py]) => {
        grid[gridY + py][gridX + px] = piece.color;
      });
      renderGrid();
    }

    // ═══════════════════════════════════════════════════════════════
    // LINE CLEARING
    // ═══════════════════════════════════════════════════════════════
    function checkAndClearLines() {
      const rowsToClear = [];
      const colsToClear = [];

      // Check rows
      for (let y = 0; y < GRID_SIZE; y++) {
        if (grid[y].every(cell => cell !== null)) {
          rowsToClear.push(y);
        }
      }

      // Check columns
      for (let x = 0; x < GRID_SIZE; x++) {
        let full = true;
        for (let y = 0; y < GRID_SIZE; y++) {
          if (!grid[y][x]) {
            full = false;
            break;
          }
        }
        if (full) colsToClear.push(x);
      }

      if (rowsToClear.length > 0 || colsToClear.length > 0) {
        // Animate clearing
        const cellsToClear = new Set();

        rowsToClear.forEach(y => {
          for (let x = 0; x < GRID_SIZE; x++) {
            cellsToClear.add(`${x},${y}`);
          }
        });

        colsToClear.forEach(x => {
          for (let y = 0; y < GRID_SIZE; y++) {
            cellsToClear.add(`${x},${y}`);
          }
        });

        // Add clearing animation
        cellsToClear.forEach(key => {
          const [x, y] = key.split(',').map(Number);
          const cellEl = gridEl.querySelector(`[data-x="${x}"][data-y="${y}"]`);
          if (cellEl) cellEl.classList.add('clearing');
        });

        // Clear after animation
        setTimeout(() => {
          cellsToClear.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            grid[y][x] = null;
          });

          const clearedLines = rowsToClear.length + colsToClear.length;
          linesCleared += clearedLines;

          // Bonus scoring for multiple lines
          const lineScore = clearedLines * GRID_SIZE * 10;
          const bonusMultiplier = clearedLines > 1 ? clearedLines : 1;
          score += lineScore * bonusMultiplier;

          updateScore();
          renderGrid();
        }, 400);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // GAME FLOW
    // ═══════════════════════════════════════════════════════════════
    function startGame() {
      gameState = 'playing';
      score = 0;
      linesCleared = 0;

      overlay.classList.add('hidden');
      finalScore.classList.add('hidden');
      highScoreMsg.classList.add('hidden');

      initGrid();
      generatePieceSet();
      updateScore();
    }

    function checkGameOver() {
      // Check if any piece can be placed
      const canPlayAny = currentPieces.some(piece => {
        if (piece.used) return false;
        return canPieceFitAnywhere(piece);
      });

      if (!canPlayAny) {
        endGame();
      }
    }

    function endGame() {
      gameState = 'over';

      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('blockBreakerHighScore', highScore.toString());
        bestDisplay.textContent = highScore;
        highScoreMsg.textContent = 'NEW HIGH SCORE!';
        highScoreMsg.classList.remove('hidden');
      }

      overlayMsg.textContent = 'No more moves available!';
      finalScore.textContent = `Score: ${score}`;
      finalScore.classList.remove('hidden');
      startBtn.textContent = 'PLAY AGAIN';
      overlay.classList.remove('hidden');
    }

    function updateScore() {
      scoreDisplay.textContent = score;
      linesDisplay.textContent = linesCleared;
    }

    // ═══════════════════════════════════════════════════════════════
    // START
    // ═══════════════════════════════════════════════════════════════
    init();

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  })();
  </script>
